name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Server — install
        run: npm ci
        working-directory: server

      - name: Client — install & build
        run: |
          npm ci
          npm run build
        working-directory: client
